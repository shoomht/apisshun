<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Page Not Found - ShunKazama API">
    <meta name="theme-color" content="#0B0E14">
    <title>404 - Page Not Found | ShunKazama API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'display': ['Space Grotesk', '-apple-system', 'Segoe UI', 'Roboto', 'system-ui', 'sans-serif'],
                        'sans': ['Inter', '-apple-system', 'Segoe UI', 'Roboto', 'system-ui', 'sans-serif'],
                        'mono': ['JetBrains Mono', 'ui-monospace', 'SF Mono', 'Consolas', 'Roboto Mono', 'monospace']
                    },
                    colors: {
                        base: { DEFAULT: '#0B0E14', line: '#1E2330' },
                        ink: { DEFAULT: '#E4E7EC', dim: '#8C94A6', faint: '#5C6478' },
                        accent: '#7C8CFF',
                        bad: '#F2545B'
                    }
                }
            }
        }
    </script>
    <style>
        ::-webkit-scrollbar { display: none !important; }

        body {
            background-color: #0B0E14;
            background-image: radial-gradient(ellipse 900px 500px at 50% -10%, rgba(124, 140, 255, 0.10), transparent);
        }

        .code-glow {
            color: #7C8CFF;
            text-shadow: 0 0 40px rgba(124, 140, 255, 0.35);
        }

        .cursor-blink {
            display: inline-block;
            width: 0.5em;
            background: #7C8CFF;
            animation: blink 1.1s steps(1) infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        @media (prefers-reduced-motion: reduce) {
            .cursor-blink, .floating { animation: none; }
        }

        .btn-run {
            background: #7C8CFF;
            color: #0B0E14;
            border-radius: 6px;
            font-weight: 600;
            transition: background-color 0.15s ease, transform 0.1s ease;
        }
        .btn-run:hover { background: #9AA6FF; }
        .btn-run:active { transform: translateY(1px); }

        a:focus-visible, button:focus-visible {
            outline: 2px solid #7C8CFF;
            outline-offset: 2px;
        }
    </style>
</head>
<body class="text-ink antialiased font-sans min-h-screen">
    <main class="max-w-2xl mx-auto px-8 py-16 min-h-screen flex items-center justify-center">
        <div class="text-center w-full">
            <div class="floating mb-8">
                <div class="text-7xl sm:text-8xl font-display font-bold code-glow mb-1 flex items-center justify-center">
                    404<span class="cursor-blink h-12 sm:h-14 ml-1"></span>
                </div>
            </div>

            <h1 class="text-xl sm:text-2xl font-display font-semibold text-ink mb-4">Page not found</h1>

            <p class="text-ink-dim text-sm mb-10 max-w-md mx-auto leading-relaxed">
                The route you're looking for doesn't exist on this server. It may have been moved, removed, or the URL was typed incorrectly.
            </p>

            <div class="flex justify-center mb-12">
                <a href="/" class="btn-run px-6 py-3 text-sm inline-flex items-center">
                    <span class="material-icons text-base mr-2">home</span>
                    Back to documentation
                </a>
            </div>

            <div class="text-center space-y-1 border-t border-base-line pt-6">
                <p class="text-ink-faint text-xs font-mono">
                    © <span id="year"></span> ShunKazama API — All Rights Reserved.
                </p>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('year').textContent = new Date().getFullYear();
    </script>
</body>
</html>
